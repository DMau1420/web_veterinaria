<div class="flex min-h-screen bg-white font-sans">
  <div class="hidden lg:flex w-1/2 bg-cover bg-center relative"
       style="background-image: url('imagenes/background.jpg');">
    <div class="absolute inset-0 bg-black/20"></div>
    <div class="absolute bottom-12 left-12 text-white z-10">
      <h2 class="text-4xl font-bold mb-2 text-white">Cuidamos de tus mascotas</h2>
      <p class="text-lg opacity-90">Agenda citas y gestiona la salud de tus compañeros peludos </p>
    </div>
  </div>

  <div class="w-full lg:w-1/2 flex items-center justify-center p-8 md:p-16">
    <div class="max-w-md w-full space-y-8">
      <div class="text-center">
        <div class="inline-flex items-center justify-center w-12 h-12 bg-blue-100 rounded-full text-vet-primary mb-4 text-2xl">
          💙
        </div>
        <h2 class="text-3xl font-extrabold text-slate-900">Bienvenido</h2>
        <p class="text-slate-500 mt-2">Inicia sesión en tu cuenta de VetCitas </p>
      </div>

      <form class="mt-8 space-y-5" (ngSubmit)="onLogin()">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">Email / Telefono</label>
          <input type="email" [(ngModel)]="email" name="email" required placeholder="tu@email.com / telefono"
                 class="block w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-vet-primary outline-none transition-all">
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">Contraseña</label>
          <input type="password" [(ngModel)]="password" name="password" required placeholder="••••••••"
                 class="block w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-vet-primary outline-none transition-all">
        </div>

        <div class="flex items-center justify-between text-sm">
          <label class="flex items-center text-slate-600">
            <input type="checkbox" class="rounded border-slate-300 text-vet-primary mr-2">
            Recordarme
          </label>
          <a href="#" class="font-medium text-vet-primary hover:text-blue-700">¿Olvidaste tu contraseña? </a>
        </div>

        @if (errorMessage) {
          <p class="text-red-500 text-sm font-semibold mt-2 text-center">{{ errorMessage }}</p>
        }

        <button type="submit"
                class="w-full bg-vet-primary font-bold py-3 px-4 rounded-xl bg-blue-400 hover:bg-blue-700 transition-colors shadow-lg">
          Iniciar Sesión
        </button>
      </form>

      <p class="text-center text-sm text-slate-600 mt-8">
        ¿No tienes una cuenta? <a href="/register" class="font-bold text-vet-primary hover:text-blue-500">Regístrate aquí </a>
      </p>
    </div>
  </div>
</div>
