<aside class="w-64 bg-white border-r border-slate-200 hidden md:flex flex-col shadow-sm z-10 h-full">
  <div class="h-16 flex items-center px-6 border-b border-slate-200">
    <span class="text-2xl mr-2">🐾</span>
    <span class="text-xl font-bold text-slate-800">VetCitas</span>
  </div>
  <nav class="flex-1 px-4 py-4 space-y-2">
    <a routerLink="/dashboard" routerLinkActive="bg-blue-50 !text-blue-700" [routerLinkActiveOptions]="{exact: true}" class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-xl font-medium transition-colors">
      <span class="text-xl">📊</span> Inicio
    </a>
    <a routerLink="/pacientes" routerLinkActive="bg-blue-50 !text-blue-700" class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-xl font-medium transition-colors">
      <span class="text-xl">🐕</span> Pacientes
    </a>
    <a routerLink="/citas" routerLinkActive="bg-blue-50 !text-blue-700" class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-xl font-medium transition-colors">

    </a>
  </nav>
  <div class="p-4 border-t border-slate-200">
    <a routerLink="/login" class="flex items-center gap-3 px-4 py-3 text-red-600 hover:bg-red-50 rounded-xl font-medium transition-colors">
