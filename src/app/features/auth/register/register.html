<div class="flex min-h-screen bg-white font-sans">
  <div class="hidden lg:flex w-1/2 bg-cover bg-center relative" 
       style="background-image: url('imagenes/background.jpg');">
    <div class="absolute inset-0 bg-black/20"></div>
    <div class="absolute bottom-12 left-12 text-white z-10">
      <h2 class="text-4xl font-bold mb-2 text-white">Cuidamos de tus mascotas</h2>
      <p class="text-lg opacity-90">Únete a nosotros para agendar citas y gestionar la salud de tus compañeros peludos</p>
    </div>
  </div>

  <div class="w-full lg:w-1/2 flex items-center justify-center p-8 md:p-16">
    <div class="max-w-md w-full space-y-8">
      <div class="text-center">
        <div class="inline-flex items-center justify-center w-12 h-12 bg-blue-100 rounded-full text-vet-primary mb-4 text-2xl">
          🐾
        </div>
        <h2 class="text-3xl font-extrabold text-slate-900">Crea tu cuenta</h2>
        <p class="text-slate-500 mt-2">Únete a VetCitas para empezar</p>
      </div>

      <form class="mt-8 space-y-5">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">Nombre completo</label>
          <input type="text" placeholder="Tu nombre" 
                 class="block w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-vet-primary outline-none transition-all">
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">Número de teléfono</label>
          <input type="tel" placeholder="Tu teléfono" 
                 class="block w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-vet-primary outline-none transition-all">
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">Email</label>
          <input type="email" placeholder="tu@email.com" 
                 class="block w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-vet-primary outline-none transition-all">
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">Contraseña</label>
          <input type="password" placeholder="••••••••" 
                 class="block w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-vet-primary outline-none transition-all">
        </div>

        <button (click)="onRegister()" type="button" 
                class="w-full bg-vet-primary text-white font-bold py-3 px-4 rounded-xl bg-blue-400 hover:bg-blue-700 transition-colors shadow-lg mt-4">
          Registrarse 
        </button>

        <div class="relative my-6">
          <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-200"></div></div>
          <div class="relative flex justify-center text-sm"><span class="px-2 bg-white text-slate-400">O regístrate con </span></div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <button type="button" class="flex items-center justify-center py-2.5 border border-slate-200 rounded-xl hover:bg-slate-300 transition-colors">
           <img src="icons/google-icon.svg" width="25" height="25" alt=""> Google 
          </button>
          <button type="button" class="flex items-center text-white justify-center font-bold py-2.5 border border-slate-200 rounded-xl bg-blue-500 hover:bg-blue-700 transition-colors">
            <img src="icons/facebook-icon.svg" width="25" height="25" alt=""> Facebook 
          </button>
        </div>
      </form>

      <p class="text-center text-sm text-slate-600 mt-8">
        ¿Ya tienes una cuenta? <a href="/login" class="font-bold text-vet-primary hover:text-blue-500">Inicia sesión aquí </a>
      </p>
    </div>
  </div>
</div>
